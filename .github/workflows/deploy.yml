name: Deploy Gaokao Advisor

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest httpx

      - name: Seed database
        run: python data/seed_sichuan.py

      - name: Run API health check
        run: |
          uvicorn backend.app.main:app --host 0.0.0.0 --port 8082 &
          sleep 3
          curl -f http://localhost:8082/api/health
          curl -s http://localhost:8082/api/health | python -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', 'health failed'"
          echo "✓ API healthy"

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gaokao-advisor:latest
            ghcr.io/${{ github.repository_owner }}/gaokao-advisor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
