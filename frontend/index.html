<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高考志愿顾问</title>
  <style>
    :root {
      --bg: #fafafa; --card: #fff; --text: #1a1a1a; --muted: #888;
      --blue: #2563eb; --green: #059669; --red: #dc2626; --amber: #d97706;
      --radius: 10px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, 'Microsoft YaHei', sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
    .app { max-width:600px; margin:0 auto; padding:20px 16px 40px; }

    .header { text-align:center; padding:20px 0; }
    .header h1 { font-size:22px; font-weight:700; margin-bottom:4px; }
    .header p { font-size:13px; color:var(--muted); }

    .form { background:var(--card); border-radius:var(--radius); padding:16px; box-shadow:0 1px 4px rgba(0,0,0,.06); margin-bottom:16px; }
    .form-row { display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end; }
    .field { flex:1; min-width:80px; }
    .field label { display:block; font-size:11px; font-weight:600; color:var(--muted); margin-bottom:3px; }
    .field select, .field input { width:100%; padding:8px 10px; font-size:15px; border:1px solid #ddd; border-radius:6px; background:var(--card); }
    .field select:focus, .field input:focus { outline:none; border-color:var(--blue); }
    .btn { padding:9px 20px; font-size:15px; font-weight:600; background:var(--blue); color:#fff; border:none; border-radius:6px; cursor:pointer; white-space:nowrap; }
    .btn:disabled { opacity:.6; }
    .btn:hover:not(:disabled) { background:#1d4ed8; }

    .disclaimer { font-size:11px; color:var(--amber); background:#fffbeb; border:1px solid #fcd34d; border-radius:8px; padding:10px 12px; margin-bottom:16px; line-height:1.5; }

    .loading { text-align:center; padding:30px; display:none; }
    .loading.show { display:block; }
    .spinner { width:24px; height:24px; border:3px solid #e5e7eb; border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 8px; }
    @keyframes spin { to{transform:rotate(360deg);} }

    .ai-box { background:linear-gradient(135deg,#eff6ff,#f0f9ff); border:1px solid #bfdbfe; border-radius:var(--radius); padding:14px 16px; margin-bottom:16px; }
    .ai-box h3 { font-size:14px; color:var(--blue); margin-bottom:6px; }
    .ai-box p { font-size:13px; color:#334155; white-space:pre-line; }

    .major-card { background:var(--card); border-radius:var(--radius); box-shadow:0 1px 4px rgba(0,0,0,.06); margin-bottom:10px; overflow:hidden; cursor:pointer; }
    .major-card:hover { box-shadow:0 2px 8px rgba(0,0,0,.1); }
    .major-head { padding:12px 14px; display:flex; justify-content:space-between; align-items:center; }
    .major-name { font-size:15px; font-weight:600; display:flex; align-items:center; gap:6px; }
    .major-name .icon { font-size:20px; }
    .major-score { font-size:11px; font-weight:700; padding:2px 8px; border-radius:10px; }
    .score-high { background:#dcfce7; color:#166534; }
    .score-mid { background:#fef3c7; color:#92400e; }
    .score-low { background:#fee2e2; color:#991b1b; }
    .major-tags { font-size:11px; color:var(--muted); padding:0 14px 10px; display:flex; flex-wrap:wrap; gap:8px; }
    .tag { background:#f3f4f6; padding:2px 8px; border-radius:4px; white-space:nowrap; }
    .tag-green { background:#dcfce7; color:#166534; }
    .tag-blue { background:#eff6ff; color:#1e40af; }

    .schools { display:none; border-top:1px solid #f0f0f0; padding:8px 14px 12px; background:#fafbfc; }
    .schools.open { display:block; }
    .school-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; font-size:13px; border-bottom:1px solid #f5f5f5; }
    .school-row:last-child { border-bottom:none; }
    .school-name { font-weight:500; }
    .school-tier { font-size:10px; padding:1px 6px; border-radius:3px; font-weight:600; }
    .tier-rush { background:#fee2e2; color:#991b1b; }
    .tier-steady { background:#fef3c7; color:#92400e; }
    .tier-safe { background:#dcfce7; color:#166534; }

    .expand-hint { font-size:11px; color:var(--blue); text-align:right; padding-right:14px; padding-bottom:6px; }
    .empty { text-align:center; padding:40px; color:var(--muted); font-size:14px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🎓 高考志愿顾问</h1>
    <p>输入分数，看值得读的专业</p>
  </div>

  <div class="form">
    <div class="form-row">
      <div class="field" style="flex:0.8">
        <label>省份</label>
        <select id="province"><option value="四川" selected>四川</option></select>
      </div>
      <div class="field" style="flex:1">
        <label>高考分数</label>
        <input type="number" id="score" value="591" min="100" max="750" autofocus>
      </div>
      <div class="field" style="flex:0.8">
        <label>类别</label>
        <select id="category"><option value="物理类" selected>物理类</option><option value="历史类">历史类</option></select>
      </div>
      <div class="field" style="flex:1">
        <label>选科</label>
        <select id="subject"><option value="物化生" selected>物化生</option><option value="物化地">物化地</option><option value="物化政">物化政</option><option value="物生地">物生地</option><option value="史政地">史政地</option></select>
      </div>
      <button class="btn" onclick="search()" id="btn">🔍 推荐</button>
    </div>
  </div>

  <div class="disclaimer">
    ⚠️ 基于2025年历史录取数据推算，2026年分数线会波动。仅供参考，最终请以省教育考试院官方为准。
  </div>

  <div class="loading" id="loading"><div class="spinner"></div>分析中...</div>
  <div id="results"></div>
</div>

<script>
const API = '/api';

async function search() {
  const btn = document.getElementById('btn');
  const loading = document.getElementById('loading');
  const results = document.getElementById('results');

  const payload = {
    province: document.getElementById('province').value,
    score: parseInt(document.getElementById('score').value),
    category: document.getElementById('category').value,
    subject_combo: document.getElementById('subject').value,
  };

  if (!payload.score || payload.score < 100 || payload.score > 750) {
    results.innerHTML = '<div class="empty">请输入有效分数（100-750）</div>';
    return;
  }

  btn.disabled = true;
  loading.classList.add('show');
  results.innerHTML = '';

  try {
    const resp = await fetch(API + '/recommend-v2', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    if (!resp.ok) throw new Error((await resp.json()).detail || '请求失败');
    const data = await resp.json();
    render(data);
  } catch (e) {
    results.innerHTML = `<div class="empty">⚠️ ${e.message}</div>`;
  } finally {
    loading.classList.remove('show');
    btn.disabled = false;
  }
}

function render(data) {
  const results = document.getElementById('results');
  let html = '';

  // AI Summary
  if (data.ai_summary) {
    html += `<div class="ai-box"><h3>🤖 AI 职业分析</h3><p>${data.ai_summary}</p></div>`;
  }

  // Rank info
  if (data.estimated_rank) {
    html += `<div style="font-size:12px;color:var(--muted);text-align:center;padding:8px 0;">你的位次：全省第 <b>${data.estimated_rank.toLocaleString()}</b> 名${data.cutoff_score ? ` | 本科线 ${data.cutoff_score}分` : ''}</div>`;
  }

  if (!data.majors || data.majors.length === 0) {
    html += '<div class="empty">该分数段暂无可推荐的专业方向，请调整分数后重试。</div>';
    results.innerHTML = html;
    return;
  }

  for (const m of data.majors) {
    let scoreClass = m.quality_score >= 85 ? 'score-high' : m.quality_score >= 70 ? 'score-mid' : 'score-low';
    let emoji = m.quality_score >= 90 ? '🔥' : m.quality_score >= 80 ? '⭐' : m.quality_score >= 70 ? '👍' : '📌';

    let tagsHtml = '';
    if (m.civil_service_note) tagsHtml += `<span class="tag tag-blue">🏛️ ${m.civil_service_note}</span>`;
    if (m.growth_note) tagsHtml += `<span class="tag tag-green">📈 ${m.growth_note}</span>`;
    if (m.avg_salary) tagsHtml += `<span class="tag">💰 ${(m.avg_salary/10000).toFixed(1)}万/年</span>`;
    if (m.employment_rate && m.employment_rate >= 0.9) tagsHtml += `<span class="tag">✅ 就业率${(m.employment_rate*100).toFixed(0)}%</span>`;
    if (m.zhang_xuefeng_comment) tagsHtml += `<span class="tag">💬 ${m.zhang_xuefeng_comment}</span>`;

    let schoolsHtml = '';
    const schools = m.schools || [];
    for (const s of schools) {
      let tierCls = s.tier === '冲刺' ? 'tier-rush' : s.tier === '稳妥' ? 'tier-steady' : 'tier-safe';
      let levelBadge = s.level ? ` · ${s.level}` : '';
      schoolsHtml += `<div class="school-row">
        <span class="school-name">🏫 ${s.name}${levelBadge} <span style="color:var(--muted);font-size:11px;">${s.city||''} ${s.min_score}分</span></span>
        <span class="school-tier ${tierCls}">${s.tier}</span>
      </div>`;
    }

    html += `
    <div class="major-card" onclick="this.querySelector('.schools').classList.toggle('open')">
      <div class="major-head">
        <span class="major-name"><span class="icon">${emoji}</span>${m.major_category}</span>
        <span class="major-score ${scoreClass}">${m.quality_score}分</span>
      </div>
      <div class="major-tags">${tagsHtml}</div>
      ${schools.length > 0 ? `<div class="expand-hint">▼ 点击查看 ${schools.length} 所院校</div>` : ''}
      <div class="schools">${schoolsHtml}</div>
    </div>`;
  }

  // AI analysis for each major (if available)
  for (const m of data.majors) {
    if (m.ai_analysis) {
      // Insert ai analysis into the card
    }
  }

  results.innerHTML = html;
}

document.getElementById('score').addEventListener('keydown', (e) => { if (e.key === 'Enter') search(); });
window.addEventListener('DOMContentLoaded', () => { search(); });
</script>
</body>
</html>
