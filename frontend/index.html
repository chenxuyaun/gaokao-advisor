<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>高考志愿顾问</title>
  <style>
    :root {
      --bg: #fafafa; --card: #fff; --text: #1a1a1a; --muted: #888;
      --blue: #2563eb; --green: #059669; --red: #dc2626; --amber: #d97706;
      --radius: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif; background:var(--bg); color:var(--text); line-height:1.6; -webkit-tap-highlight-color:transparent; }
    .app { max-width:640px; margin:0 auto; padding:16px 12px 40px; }

    .header { text-align:center; padding:16px 0 8px; }
    .header h1 { font-size:clamp(18px,5vw,22px); font-weight:700; margin-bottom:2px; }
    .header p { font-size:13px; color:var(--muted); }

    .form { background:var(--card); border-radius:var(--radius); padding:14px; box-shadow:0 1px 4px rgba(0,0,0,.06); margin-bottom:12px; }
    .form-row { display:flex; gap:6px; flex-wrap:wrap; align-items:flex-end; }
    .field { flex:1; min-width:60px; }
    .field label { display:block; font-size:11px; font-weight:600; color:var(--muted); margin-bottom:2px; }
    .field select, .field input { width:100%; padding:10px 8px; font-size:15px; border:1px solid #ddd; border-radius:8px; background:var(--card); -webkit-appearance:none; }
    .field select:focus, .field input:focus { outline:none; border-color:var(--blue); }
    .btn { padding:11px 16px; font-size:15px; font-weight:600; background:var(--blue); color:#fff; border:none; border-radius:8px; cursor:pointer; white-space:nowrap; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
    .btn:active { background:#1d4ed8; transform:scale(0.97); }

    .disclaimer { font-size:11px; color:var(--amber); background:#fffbeb; border:1px solid #fcd34d; border-radius:8px; padding:8px 10px; margin-bottom:12px; line-height:1.4; }

    .loading { text-align:center; padding:24px; display:none; }
    .loading.show { display:block; }
    .spinner { width:24px; height:24px; border:3px solid #e5e7eb; border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 6px; }
    @keyframes spin { to{transform:rotate(360deg);} }

    .ai-box { background:linear-gradient(135deg,#eff6ff,#f0f9ff); border:1px solid #bfdbfe; border-radius:var(--radius); padding:12px 14px; margin-bottom:12px; }
    .ai-box h3 { font-size:14px; color:var(--blue); margin-bottom:4px; display:flex; align-items:center; gap:4px; }
    .ai-box .ai-text { font-size:13px; color:#334155; line-height:1.7; }

    .rank-bar { font-size:12px; color:var(--muted); text-align:center; padding:6px 0; }

    .major-card { background:var(--card); border-radius:var(--radius); box-shadow:0 1px 4px rgba(0,0,0,.06); margin-bottom:8px; overflow:hidden; }
    .major-head { padding:12px 14px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; }
    .major-head:active { background:#f9fafb; }
    .major-name { font-size:15px; font-weight:600; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .major-name .icon { font-size:20px; }
    .major-score { font-size:11px; font-weight:700; padding:2px 8px; border-radius:10px; flex-shrink:0; }
    .score-high { background:#dcfce7; color:#166534; }
    .score-mid { background:#fef3c7; color:#92400e; }

    .major-tags { padding:0 14px 8px; display:flex; flex-wrap:wrap; gap:6px; }
    .tag { font-size:11px; background:#f3f4f6; padding:3px 8px; border-radius:5px; white-space:nowrap; }
    .tag-green { background:#dcfce7; color:#166534; }
    .tag-blue { background:#eff6ff; color:#1e40af; }
    .tag-amber { background:#fffbeb; color:#92400e; }

    .expand-hint { font-size:11px; color:var(--blue); text-align:center; padding:4px 14px 8px; opacity:.8; }

    /* Detail panel — WHY recommended */
    .why-panel { display:none; border-top:1px solid #f0f0f0; padding:10px 14px; background:#fafbfc; }
    .why-panel.open { display:block; }
    .why-section { margin-bottom:8px; }
    .why-section h4 { font-size:12px; font-weight:700; color:var(--blue); margin-bottom:3px; }
    .why-section p { font-size:12px; color:#475569; line-height:1.6; }

    /* Schools list */
    .schools { border-top:1px solid #f0f0f0; padding:8px 14px 10px; background:#f9fafb; }
    .school-row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; font-size:13px; border-bottom:1px solid #f5f5f5; flex-wrap:wrap; gap:4px; }
    .school-row:last-child { border-bottom:none; }
    .school-name { font-weight:500; }
    .school-tier { font-size:10px; padding:2px 6px; border-radius:4px; font-weight:600; flex-shrink:0; }
    .tier-rush { background:#fee2e2; color:#991b1b; }
    .tier-steady { background:#fef3c7; color:#92400e; }
    .tier-safe { background:#dcfce7; color:#166534; }

    .empty { text-align:center; padding:40px 16px; color:var(--muted); font-size:14px; }

    /* Ask Q&A Panel */
    .ask-btn { background:var(--blue); color:#fff; border:none; border-radius:6px; padding:8px 14px; font-size:13px; cursor:pointer; font-weight:500; width:100%; margin-top:8px; }
    .ask-btn:active { background:#1d4ed8; }
    .ask-panel { display:none; border-top:1px solid #f0f0f0; padding:10px 14px; background:#f8fafc; }
    .ask-panel.open { display:block; }
    .ask-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
    .ask-chip { font-size:12px; padding:6px 10px; border:1px solid #ddd; border-radius:16px; background:#fff; cursor:pointer; user-select:none; }
    .ask-chip.selected { background:var(--blue); color:#fff; border-color:var(--blue); }
    .ask-answers { margin-top:8px; }
    .ask-answer-item { background:#fff; border-radius:8px; padding:10px 12px; margin-bottom:6px; border:1px solid #e5e7eb; }
    .ask-answer-q { font-size:12px; font-weight:600; color:var(--blue); margin-bottom:4px; }
    .ask-answer-a { font-size:13px; color:#475569; line-height:1.6; }
    .ask-sources { font-size:10px; color:var(--muted); margin-top:4px; }
    .ask-loading { text-align:center; padding:8px; font-size:12px; color:var(--muted); }

    /* Mobile tweaks */
    @media (max-width: 400px) {
      .app { padding:10px 8px 30px; }
      .form { padding:10px; }
      .form-row { gap:4px; }
      .field { min-width:50px; }
      .field select, .field input { padding:8px 6px; font-size:14px; }
      .btn { padding:10px 12px; font-size:14px; }
      .major-name { font-size:14px; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🎓 高考志愿顾问</h1>
    <p>输入分数，看值得读的专业 — AI帮你分析为什么值得读</p>
  </div>

  <div class="form">
    <div class="form-row">
      <div class="field" style="flex:0.7">
        <label>省份</label>
        <select id="province" onchange="onProvinceChange()">
          <optgroup label="☀️ 3+3 改革省份（综合）">
            <option value="北京">北京</option><option value="天津">天津</option><option value="上海">上海</option>
            <option value="浙江">浙江</option><option value="山东">山东</option><option value="海南">海南</option>
          </optgroup>
          <optgroup label="📍 3+1+2 改革省份（物理类/历史类）">
            <option value="广东">广东</option><option value="江苏">江苏</option><option value="湖北">湖北</option>
            <option value="湖南">湖南</option><option value="河北">河北</option><option value="福建">福建</option>
            <option value="安徽">安徽</option><option value="江西">江西</option><option value="辽宁">辽宁</option>
            <option value="重庆">重庆</option><option value="贵州">贵州</option><option value="云南">云南</option>
            <option value="山西">山西</option><option value="陕西">陕西</option><option value="甘肃">甘肃</option>
            <option value="黑龙江">黑龙江</option><option value="吉林">吉林</option>
            <option value="广西">广西</option><option value="内蒙古">内蒙古</option>
          </optgroup>
          <optgroup label="🏔️ 传统文理分省">
            <option value="河南">河南</option><option value="四川" selected>四川</option>
            <option value="新疆">新疆</option><option value="宁夏">宁夏</option>
            <option value="青海">青海</option><option value="西藏">西藏</option>
          </optgroup>
        </select>
      </div>
      <div class="field" style="flex:0.9">
        <label>高考分数</label>
        <input type="number" id="score" value="591" min="100" max="750" inputmode="numeric" autofocus>
      </div>
      <div class="field" style="flex:0.7">
        <label>类别</label>
        <select id="category" onchange="updateSubjects()"><option value="物理类" selected>物理类</option><option value="历史类">历史类</option></select>
      </div>
      <div class="field" style="flex:0.9">
        <label>选科</label>
        <select id="subject"><option value="物化生" selected>物化生</option><option value="物化地">物化地</option><option value="物化政">物化政</option><option value="物生地">物生地</option><option value="史政地">史政地</option></select>
      </div>
      <button class="btn" onclick="search()" id="btn">🔍 推荐</button>
    </div>
  </div>

  <div class="disclaimer">
    ⚠️ 基于2025年历史录取数据推算。仅供参考，最终请以省教育考试院官方为准。
  </div>

  <div class="loading" id="loading"><div class="spinner"></div>AI 正在分析中...</div>
  <div id="results"></div>
</div>

<script>
const API = '/api';

async function search() {
  const btn = document.getElementById('btn');
  const loading = document.getElementById('loading');
  const results = document.getElementById('results');

  const payload = {
    province: document.getElementById('province').value,
    score: parseInt(document.getElementById('score').value),
    category: document.getElementById('category').value,
    subject_combo: document.getElementById('subject').value,
  };

  if (!payload.score || payload.score < 100 || payload.score > 750) {
    results.innerHTML = '<div class="empty">请输入有效分数（100-750）</div>';
    return;
  }

  btn.disabled = true;
  loading.classList.add('show');
  results.innerHTML = '';

  try {
    const resp = await fetch(API + '/recommend-v3', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    if (!resp.ok) throw new Error((await resp.json()).detail || '请求失败');
    const data = await resp.json();
    render(data);
  } catch (e) {
    results.innerHTML = `<div class="empty">⚠️ ${e.message}</div>`;
  } finally {
    loading.classList.remove('show');
    btn.disabled = false;
  }
}

function render(data) {
  const results = document.getElementById('results');
  let html = '';

  // AI Summary
  if (data.ai_summary) {
    // Format AI text: bold **text**, newlines
    let aiText = data.ai_summary
      .replace(/\*\*(.+?)\*\*/g, '<b style="color:#1e40af">$1</b>')
      .replace(/\n/g, '<br>');
    html += `<div class="ai-box"><h3>🤖 AI 职业分析</h3><div class="ai-text">${aiText}</div></div>`;
  }

  if (data.estimated_rank) {
    html += `<div class="rank-bar">你的位次：全省第 <b>${data.estimated_rank.toLocaleString()}</b> 名${data.cutoff_score ? ' | 本科线 '+data.cutoff_score+'分' : ''}</div>`;
  }

  if (!data.majors || data.majors.length === 0) {
    html += '<div class="empty">该分数段暂无可推荐的专业方向</div>';
    results.innerHTML = html;
    return;
  }

  for (const m of data.majors) {
    let scoreClass = m.quality_score >= 85 ? 'score-high' : 'score-mid';
    let emoji = m.quality_score >= 95 ? '🔥' : m.quality_score >= 85 ? '⭐' : '👍';
    let scoreLabel = m.quality_score >= 95 ? '强烈推荐' : m.quality_score >= 85 ? '推荐' : '可考虑';

    // Tags
    let tagsHtml = '';
    if (m.civil_service_note) tagsHtml += `<span class="tag tag-blue">🏛️ 考公：${m.civil_service_note}</span>`;
    if (m.avg_salary) tagsHtml += `<span class="tag">💰 ${(m.avg_salary/10000).toFixed(1)}万/年</span>`;
    if (m.employment_rate) {
      let rate = (m.employment_rate*100).toFixed(0);
      let rateCls = m.employment_rate >= 0.95 ? 'tag-green' : m.employment_rate >= 0.9 ? '' : 'tag-amber';
      tagsHtml += `<span class="tag ${rateCls}">📈 就业率${rate}%</span>`;
    }

    // WHY recommended — build detailed explanation
    let whyHtml = buildWhyPanel(m);

    // Schools
    let schoolsHtml = '';
    for (const s of (m.schools || [])) {
      let tierCls = s.tier === '冲刺' ? 'tier-rush' : s.tier === '稳妥' ? 'tier-steady' : 'tier-safe';
      let levelBadge = s.level ? ` <span style="color:var(--muted);font-size:10px">${s.level}</span>` : '';
      schoolsHtml += `<div class="school-row">
        <span class="school-name">🏫 ${s.name}${levelBadge} <span style="color:var(--muted);font-size:11px;">${s.city||''} ${s.min_score}分</span></span>
        <span class="school-tier ${tierCls}">${s.tier}</span>
      </div>`;
    }

    html += `
    <div class="major-card" data-major="${m.major_category.replace(/"/g,'&quot;')}">
      <div class="major-head" onclick="toggleCard(this)">
        <span class="major-name"><span class="icon">${emoji}</span>${m.major_category}</span>
        <span class="major-score ${scoreClass}">${m.quality_score}分 · ${scoreLabel}</span>
      </div>
      <div class="major-tags">${tagsHtml}</div>
      <div class="why-panel">${whyHtml}</div>
      ${schoolsHtml ? `<div class="schools">${schoolsHtml}</div>` : ''}
      <div class="expand-hint" onclick="toggleCard(this.parentElement.querySelector('.major-head'))">👆 点击查看为什么推荐 & 适合的学校</div>
      <button class="ask-btn" onclick="event.stopPropagation();toggleAsk(this)">💬 有疑问？问AI</button>
      <div class="ask-panel">
        <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">点选常用问题，或输入你想问的：</div>
        <div class="ask-chips"></div>
        <input class="ask-input" type="text" placeholder="✍️ 自己输入问题…" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-top:6px;">
        <button class="ask-btn" style="margin-top:6px;background:#059669;" onclick="submitAsk(this)">🤖 让AI回答</button>
        <div class="ask-answers"></div>
      </div>
    </div>
    `;
  }

  results.innerHTML = html;
}

function buildWhyPanel(m) {
  let parts = [];

  // Core reason
  let coreReason = '';
  let qs = m.quality_score;
  if (qs >= 95) coreReason = '这是该分数段就业确定性强、薪资天花板高的方向。';
  else if (qs >= 85) coreReason = '综合就业率、薪资和考公前景来看，性价比较高。';
  else coreReason = '有一定就业保障，但建议结合个人兴趣和家庭情况综合考虑。';

  // Employment analysis
  let empAnalysis = '';
  if (m.employment_rate && m.avg_salary) {
    if (m.employment_rate >= 0.95 && m.avg_salary >= 120000) {
      empAnalysis = `就业率高达${(m.employment_rate*100).toFixed(0)}%，5年薪资约${(m.avg_salary/10000).toFixed(0)}万/年。这是一个"越老越值钱"的方向，不像互联网有35岁危机。`;
    } else if (m.employment_rate >= 0.9) {
      empAnalysis = `就业率${(m.employment_rate*100).toFixed(0)}%，属于就业确定性较高的方向。`;
    } else {
      empAnalysis = `就业率${(m.employment_rate*100).toFixed(0)}%，需要注意行业波动风险。`;
    }
  }

  // 考公 analysis
  let civilAnalysis = '';
  if (m.civil_service_note) {
    let departments = m.civil_service_note;
    if (departments.includes('法院') || departments.includes('检察院')) {
      civilAnalysis = `考公优势极大！${departments}每年大量招人，专业壁垒高，非对口专业无法报考。但需通过法考。`;
    } else if (departments.includes('卫健委') || departments.includes('疾控')) {
      civilAnalysis = `考公可报考${departments}。医学类岗位有专业壁垒，竞争相对较小。`;
    } else if (departments.includes('财政局') || departments.includes('审计') || departments.includes('税务')) {
      civilAnalysis = `考公大户！${departments}每年稳定招录，且岗位数量多。`;
    } else {
      civilAnalysis = `考公可报考${departments}等对口单位。`;
    }
  }

  // Growth outlook
  let growthAnalysis = m.growth_note || '';
  if (m.career_path) {
    growthAnalysis += ` 就业方向：${m.career_path}。`;
  }
  if (m.zhang_xuefeng_comment) {
    growthAnalysis += ` 点评：${m.zhang_xuefeng_comment}`;
  }

  // Risk/pitfall if applicable
  let riskAnalysis = '';
  if (m.major_category.includes('环境') || m.major_category.includes('材料')) {
    riskAnalysis = '⚠️ 注意：该方向本科就业薪资偏低，建议做好读研准备。行业受政策影响较大。';
  } else if (m.major_category.includes('生物')) {
    riskAnalysis = '⚠️ 注意：生物科学本科直接就业较难，主要路径是继续深造读博。不适合急于就业的学生。';
  }

  return `
    <div class="why-section"><h4>💡 为什么推荐</h4><p>${coreReason}</p></div>
    <div class="why-section"><h4>📊 就业分析</h4><p>${empAnalysis}</p></div>
    ${civilAnalysis ? `<div class="why-section"><h4>🏛️ 考公前景</h4><p>${civilAnalysis}</p></div>` : ''}
    ${growthAnalysis ? `<div class="why-section"><h4>📈 发展前景</h4><p>${growthAnalysis}</p></div>` : ''}
    ${riskAnalysis ? `<div class="why-section" style="background:#fff7ed;padding:6px 8px;border-radius:6px;"><h4 style="color:#c2410c;">⚠️ 风险提醒</h4><p style="color:#9a3412;">${riskAnalysis}</p></div>` : ''}
  `;
}

function toggleCard(headEl) {
  const card = headEl.closest('.major-card');
  const panel = card.querySelector('.why-panel');
  if (panel) panel.classList.toggle('open');
}

// === Ask AI Q&A ===
const PARENT_QUESTIONS = [
  '这个专业出来做什么工作？',
  '毕业后好找工作吗？薪资多少？',
  '能考公务员吗？什么岗位？',
  '考研好考吗？保研率多少？',
  '这个专业对女生友好吗？',
  '这个专业未来会被AI取代吗？',
  '哪些学校这个专业比较强？',
  '毕业后留本地还是去一线城市？',
  '这个专业需要考研吗？',
  '考教师资格证有用吗？',
];

async function loadQuestions(card) {
  const chips = card.querySelector('.ask-chips');
  const major = card.getAttribute('data-major');
  // Try to get AI-generated questions first
  try {
    const params = new URLSearchParams({
      province: document.getElementById('province').value,
      category: document.getElementById('category').value,
      score: document.getElementById('score').value,
      major: major || '',
    });
    const resp = await fetch(`/api/ask/dynamic-questions?${params}`);
    if (resp.ok) {
      const data = await resp.json();
      if (data.questions && data.questions.length >= 3) {
        data.questions.forEach(q => {
          const chip = document.createElement('span');
          chip.className = 'ask-chip';
          chip.textContent = q;
          chip.onclick = function() { this.classList.toggle('selected'); };
          chips.appendChild(chip);
        });
        return;
      }
    }
  } catch (e) {}
  // Fallback to hardcoded questions
  PARENT_QUESTIONS.forEach(q => {
    const chip = document.createElement('span');
    chip.className = 'ask-chip';
    chip.textContent = q;
    chip.onclick = function() { this.classList.toggle('selected'); };
    chips.appendChild(chip);
  });
}

async function toggleAsk(btn) {
  const panel = btn.nextElementSibling;
  const chips = panel.querySelector('.ask-chips');
  
  if (!panel.classList.contains('open')) {
    panel.classList.add('open');
    // Load questions if empty
    if (!chips.children.length) {
      const card = panel.closest('.major-card');
      loadQuestions(card);
    }
    btn.textContent = '💬 收起问答';
  } else {
    panel.classList.remove('open');
    btn.textContent = '💬 有疑问？问AI';
  }
}

async function submitAsk(btn) {
  const panel = btn.parentElement;
  const card = panel.closest('.major-card');
  const answersDiv = panel.querySelector('.ask-answers');
  const selected = panel.querySelectorAll('.ask-chip.selected');
  const input = panel.querySelector('.ask-input');
  
  if (!selected.length && !(input && input.value.trim())) {
    answersDiv.innerHTML = '<div class="ask-answer-item" style="color:var(--amber);">请先选择你想问的问题</div>';
    return;
  }
  
  const questions = Array.from(selected).map(c => c.textContent);
  // Also collect custom input
  if (input && input.value.trim()) {
    questions.push(input.value.trim());
    input.value = '';
  }
  const major = card.getAttribute('data-major');
  
  answersDiv.innerHTML = '<div class="ask-loading">🤖 AI 正在搜索最新信息并分析...</div>';
  
  try {
    const resp = await fetch('/api/ask', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        province: document.getElementById('province').value,
        score: parseInt(document.getElementById('score').value),
        category: document.getElementById('category').value,
        subject_combo: document.getElementById('subject').value,
        major: major,
        questions: questions,
      }),
    });
    
    if (!resp.ok) throw new Error('请求失败');
    const data = await resp.json();
    
    let html = '';
    for (const a of data.answers) {
      let sourcesHtml = '';
      if (a.sources && a.sources.length) {
        sourcesHtml = '<div class="ask-sources">📎 参考来源：' + a.sources.map(s => `<a href="${s}" target="_blank" style="color:var(--blue);">链接</a>`).join(' | ') + '</div>';
      }
      html += `<div class="ask-answer-item">
        <div class="ask-answer-q">❓ ${a.question}</div>
        <div class="ask-answer-a">${a.answer.replace(/\n/g,'<br>')}</div>
        ${sourcesHtml}
      </div>`;
    }
    answersDiv.innerHTML = html;
  } catch (e) {
    answersDiv.innerHTML = `<div class="ask-answer-item" style="color:var(--red);">⚠️ ${e.message}</div>`;
  }
}

// === Subject combo depends on category ===
const SUBJECTS_PHYSICS = ['物化生','物化地','物化政','物生地'];
const SUBJECTS_HISTORY = ['史政地','史政生','史地化'];

const PROVINCES_3PLUS3 = ['北京','天津','上海','浙江','山东','海南'];

function updateSubjects() {
  const cat = document.getElementById('category').value;
  const sel = document.getElementById('subject');
  sel.innerHTML = '';
  if (cat === '综合') {
    // 3+3 reform: more subject combos available
    const allSubjects = ['物化生','物化政','物化地','物生地','物生政','物政地','史政地','史政生','史地化'];
    allSubjects.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      sel.appendChild(opt);
    });
  } else {
    const subjects = cat === '物理类' ? SUBJECTS_PHYSICS : SUBJECTS_HISTORY;
    subjects.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      sel.appendChild(opt);
    });
  }
}

function onProvinceChange() {
  const prov = document.getElementById('province').value;
  const cat = document.getElementById('category');
  if (PROVINCES_3PLUS3.includes(prov)) {
    // 3+3 province — only 综合
    if (cat.options.length === 0 || cat.options[0].value !== '综合') {
      cat.innerHTML = '<option value="综合" selected>综合</option>';
    } else {
      cat.value = '综合';
    }
  } else {
    // 3+1+2 or traditional — show 物理类/历史类
    if (cat.options.length !== 2 || cat.options[0].value !== '物理类') {
      cat.innerHTML = '<option value="物理类">物理类</option><option value="历史类">历史类</option>';
      cat.value = '物理类';
    }
  }
  updateSubjects();
}

document.getElementById('score').addEventListener('keydown', (e) => { if (e.key === 'Enter') search(); });
window.addEventListener('DOMContentLoaded', () => { updateSubjects(); search(); });
</script>
