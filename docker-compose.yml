version: '3.8'

services:
  app:
    build: .
    container_name: gaokao-advisor
    ports:
      - "8082:8082"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

